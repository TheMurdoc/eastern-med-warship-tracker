<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATO & Allied Warship Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'JetBrains Mono',monospace;background:#0a0e17;color:#e0e6f0;height:100vh;overflow:hidden}
  #map{width:100%;height:100vh}
  .title-bar{position:absolute;top:14px;left:56px;z-index:1000;background:rgba(10,14,23,.94);backdrop-filter:blur(14px);border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:12px 18px;max-width:500px}
  .title-bar h1{font-size:14px;font-weight:700;color:#38bdf8;margin-bottom:3px}
  .title-bar p{font-size:10px;color:#64748b}
  .tag{display:inline-block;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);color:#38bdf8;font-size:9px;padding:2px 7px;border-radius:3px;margin-top:5px;margin-right:3px}
  .legend{position:absolute;bottom:28px;left:14px;z-index:1000;background:rgba(10,14,23,.94);backdrop-filter:blur(14px);border:1px solid rgba(56,189,248,.12);border-radius:8px;padding:10px 14px;font-size:11px}
  .legend-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .legend-item:last-child{margin-bottom:0}
  .ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .panel{position:absolute;top:14px;right:14px;z-index:1000;background:rgba(10,14,23,.95);backdrop-filter:blur(14px);border:1px solid rgba(56,189,248,.18);border-radius:8px;padding:12px 16px;width:280px;max-height:calc(100vh - 36px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1e293b transparent}
  .panel h2{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
  .vc{background:rgba(30,41,59,.45);border:1px solid rgba(56,189,248,.06);border-radius:5px;padding:7px 9px;margin-bottom:4px;cursor:pointer;transition:all .2s}
  .vc:hover{border-color:rgba(56,189,248,.3);background:rgba(30,41,59,.75)}
  .vc .vn{font-size:10.5px;font-weight:700;margin-bottom:1px}
  .vc .vm{font-size:9px;color:#64748b;line-height:1.5}
  .vc .vm span{color:#94a3b8}
  .bg{display:inline-block;font-size:7.5px;padding:1px 4px;border-radius:3px;font-weight:600;margin-left:4px;vertical-align:middle}
  .bf{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
  .bs{background:rgba(250,204,21,.12);color:#facc15;border:1px solid rgba(250,204,21,.25)}
  .bd{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
  .leaflet-popup-content-wrapper{background:rgba(10,14,23,.97)!important;border:1px solid rgba(56,189,248,.3)!important;border-radius:8px!important;color:#e0e6f0!important;font-family:'JetBrains Mono',monospace!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
  .leaflet-popup-tip{background:rgba(10,14,23,.97)!important}
  .leaflet-popup-content{font-size:11px!important;line-height:1.7!important;margin:10px 14px!important}
  .pn{font-size:13px;font-weight:700;color:#38bdf8;margin-bottom:5px}
  .pr{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .pr .l{color:#64748b} .pr .v{color:#e2e8f0;text-align:right}
  .pnt{margin-top:6px;font-size:9px;color:#64748b;border-top:1px solid rgba(255,255,255,.06);padding-top:4px}
  @keyframes glow{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.8);opacity:0}}
  .leaflet-control-attribution{font-size:9px!important;opacity:.35}
</style>
</head>
<body>
<div class="title-bar">
  <h1>⚓ NATO & ALLIED WARSHIP TRACKER</h1>
  <p>AIS via Datalastic REST API — Eastern Mediterranean, March 2026</p>
  <div><span class="tag">OSINT</span><span class="tag">Datalastic</span><span class="tag">AIS/MMSI</span><span class="tag">MAR 2026</span></div>
</div>
<div class="legend">
  <div class="legend-item"><div class="ldot" style="background:#4ade80"></div>Fresh (≤7d)</div>
  <div class="legend-item"><div class="ldot" style="background:#facc15"></div>Stale (8–90d)</div>
  <div class="legend-item"><div class="ldot" style="background:#f87171"></div>Very stale (&gt;90d)</div>
  <div class="legend-item"><div class="ldot" style="background:#a78bfa"></div>404 / AIS-dark</div>
</div>
<div class="panel" id="P"></div>
<div id="map"></div>
<script>
const D=[
{n:"FRENCH.WARSHIP",m:"227999300",c:"FR",f:"🇫🇷",t:"Military Ops",la:43.0439,lo:5.9569,s:5,co:200,h:null,ns:null,ls:"2025-10-15T11:36:00Z",cl:"#facc15",no:"Near Toulon. Oct 2025 — stale."},
{n:"UNKNOWN VESSEL",m:"228711555",c:"FR",f:"🇫🇷",t:"HTTP 404",la:null,lo:null,s:null,co:null,h:null,ns:"AIS-DARK",ls:null,cl:"#a78bfa",no:"Datalastic 404. EMCON or MMSI reassigned."},
{n:"ESP NAVY SHIP",m:"225920870",c:"ES",f:"🇪🇸",t:"Military Ops",la:36.616,lo:-6.330,s:0,co:69,h:141,ns:null,ls:"2026-01-30T10:25:00Z",cl:"#facc15",no:"Rota Naval Station, Cádiz."},
{n:"NAVE LUIGI RIZZO",m:"247364500",c:"IT",f:"🇮🇹",t:"FREMM (AIS: Cargo)",la:36.398,lo:-6.583,s:17.3,co:49,h:null,ns:null,ls:"2022-06-17T10:24:00Z",cl:"#f87171",no:"FREMM frigate mistyped. 2022 — very stale."},
{n:"HNLMS EVERTSEN",m:"244942000",c:"NL",f:"🇳🇱",t:"LCF AAW Frigate",la:35.500,lo:24.193,s:6.1,co:33,h:30,ns:null,ls:"2026-03-27T15:16:00Z",cl:"#4ade80",no:"Off NW Crete. Near US WARSHIP — task group."},
{n:"NL WARSHIP F802",m:"244911000",c:"NL",f:"🇳🇱",t:"LCF (Lead ship)",la:59.252,lo:19.734,s:18.5,co:85,h:85,ns:null,ls:"2025-11-02T11:16:00Z",cl:"#facc15",no:"HNLMS De Zeven Provinciën. Baltic. Nov 2025."},
{n:"FGS NRW (F223)",m:"211921000",c:"DE",f:"🇩🇪",t:"F125 Frigate",la:34.588,lo:33.139,s:3,co:323.4,h:320,ns:"Under way",ls:"2026-03-26T11:43:46Z",cl:"#4ade80",no:"Off Limassol, Cyprus. UNIFIL rotation."},
{n:"HMS DRAGON",m:"235053408",c:"GB",f:"🇬🇧",t:"Type 45 Destroyer",la:34.838,lo:33.906,s:18.5,co:180,h:180,ns:null,ls:"2026-03-25T09:56:00Z",cl:"#4ade80",no:"Off Dhekelia/Larnaca. RN AAW asset."},
{n:"US GOVT VESSEL",m:"338803000",c:"US",f:"🇺🇸",t:"Unspecified",la:34.115,lo:-11.970,s:15.7,co:38.4,h:511,ns:"Restricted manoeuvre",ls:"2026-02-18T15:58:13Z",cl:"#facc15",no:"Atlantic, west of Morocco. Feb 2026."},
{n:"US WARSHIP",m:"338847000",c:"US",f:"🇺🇸",t:"Unspecified",la:35.511,lo:24.227,s:9.3,co:59,h:null,ns:null,ls:"2026-03-22T19:06:00Z",cl:"#4ade80",no:"Off Crete near Evertsen — task group."},
{n:"KIMON",m:"237780180",c:"GR",f:"🇬🇷",t:"Greek Navy",la:48.245,lo:-4.861,s:19,co:237.1,h:240,ns:"At anchor",ls:"2026-01-07T20:04:53Z",cl:"#facc15",no:"Off Brest, France. Speed field stale."}
];

function fr(d){if(!d)return{l:"N/A",c:"bd"};const x=Math.floor((new Date("2026-03-29")-new Date(d))/864e5);return x<=7?{l:x+"d",c:"bf"}:x<=90?{l:x+"d",c:"bs"}:{l:x+"d",c:"bd"}}
function ic(cl,sz){return L.divIcon({className:'',iconSize:[sz||24,sz||24],iconAnchor:[(sz||24)/2,(sz||24)/2],popupAnchor:[0,-(sz||24)/2],html:'<div style="position:relative;width:'+(sz||24)+'px;height:'+(sz||24)+'px"><div style="position:absolute;inset:0;border-radius:50%;background:'+cl+';opacity:.15;animation:glow 2s ease-out infinite"></div><svg width="'+(sz||24)+'" height="'+(sz||24)+'" viewBox="0 0 32 32"><polygon points="16,2 24,28 16,22 8,28" fill="'+cl+'" stroke="#0a0e17" stroke-width="1.5" opacity=".95"/></svg></div>'})}

const map=L.map('map',{center:[37,18],zoom:4,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

const P=document.getElementById('P');P.innerHTML='<h2>Vessels — Datalastic API</h2>';

D.forEach(v=>{
  const f=fr(v.ls),cd=document.createElement('div');cd.className='vc';
  cd.innerHTML='<div class="vn" style="color:'+v.cl+'">'+v.f+' '+v.n+'<span class="bg '+f.c+'">'+f.l+'</span></div><div class="vm">MMSI <span>'+v.m+'</span> · '+v.c+'<br>'+(v.la!=null?v.la.toFixed(3)+'°N, '+(v.lo>=0?v.lo.toFixed(3)+'°E':Math.abs(v.lo).toFixed(3)+'°W'):'Pos unknown')+(v.s!=null?' · '+v.s+'kn':'')+'</div>';
  P.appendChild(cd);
  if(v.la!=null){
    const mk=L.marker([v.la,v.lo],{icon:ic(v.cl)}).addTo(map);
    mk.bindPopup('<div class="pn">'+v.f+' '+v.n+'</div><div class="pr"><span class="l">MMSI</span><span class="v">'+v.m+'</span></div><div class="pr"><span class="l">Type</span><span class="v">'+v.t+'</span></div><div class="pr"><span class="l">Speed</span><span class="v">'+(v.s!=null?v.s+' kn':'—')+'</span></div><div class="pr"><span class="l">Course</span><span class="v">'+(v.co!=null?v.co+'°':'—')+'</span></div><div class="pr"><span class="l">Heading</span><span class="v">'+(v.h!=null&&v.h<360?v.h+'°':'—')+'</span></div><div class="pr"><span class="l">Nav Status</span><span class="v">'+(v.ns||'—')+'</span></div><div class="pr"><span class="l">Last AIS</span><span class="v">'+(v.ls?v.ls.replace('T',' ').replace('Z',''):'—')+'</span></div><div class="pnt">'+v.no+'</div>',{maxWidth:300});
    cd.onclick=function(){map.flyTo([v.la,v.lo],8,{duration:1});mk.openPopup()};
  }else{cd.style.opacity='.45';cd.style.borderStyle='dashed'}
});

L.polyline([[35.500,24.193],[35.511,24.227]],{color:'#38bdf8',weight:1.2,dashArray:'6 4',opacity:.45}).addTo(map);
L.polyline([[34.588,33.139],[34.838,33.906]],{color:'#38bdf8',weight:1.2,dashArray:'6 4',opacity:.45}).addTo(map);
L.circle([34.8,33.4],{radius:200000,color:'#38bdf8',fillColor:'#38bdf8',fillOpacity:.015,weight:1,dashArray:'8 6',opacity:.18}).addTo(map);
</script>
</body>
</html>
